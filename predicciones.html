<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predicciones · Prode Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--verde:#00C853;--verde-dark:#009624;--oro:#FFD600;--bg:#0a0e17;--bg2:#111827;--bg3:#1a2235;--texto:#e8edf5;--muted:#6b7a99;--border:rgba(255,255,255,0.07);--card:rgba(255,255,255,0.04);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(0,200,83,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
  nav{position:sticky;top:0;z-index:100;background:rgba(10,14,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--texto);}
  .nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--verde);box-shadow:0 0 8px var(--verde);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
  .progress-pill{background:rgba(0,200,83,0.12);border:1px solid rgba(0,200,83,0.25);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--verde);font-weight:500;}
  .wrapper{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 2rem 6rem;}
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;letter-spacing:2px;}
  .page-title .sub{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);font-weight:400;letter-spacing:0;display:block;margin-bottom:4px;}
  .hstat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
  .hstat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .global-progress{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;}
  .progress-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--verde),var(--oro));border-radius:3px;transition:width .6s ease;}
  .deadline-warn{background:rgba(255,214,0,.08);border:1px solid rgba(255,214,0,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--oro);margin-bottom:1.5rem;display:flex;align-items:center;gap:8px;}
  .group-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;}
  .gf-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .15s;font-family:'DM Sans',sans-serif;}
  .gf-btn:hover{color:var(--texto);}
  .gf-btn.active{background:rgba(0,200,83,.12);border-color:rgba(0,200,83,.35);color:var(--verde);}
  .gf-btn.done::after{content:' ✓';font-size:10px;}
  .group-section{margin-bottom:2.5rem;}
  .group-label{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
  .group-letter{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1.5px;color:var(--verde);background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.2);padding:3px 10px;border-radius:6px;}
  .group-label-line{flex:1;height:1px;background:var(--border);}
  .match-block{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
  .match-block:hover{border-color:rgba(0,200,83,.2);}
  .match-block.filled{border-color:rgba(0,200,83,.18);}
  .match-block.locked{opacity:.7;pointer-events:none;}

  /* PREDICCIONES POPULARES */
  .popular-bar{padding:8px 1.25rem 10px;border-top:1px solid var(--border);background:rgba(255,255,255,.02);}
  .popular-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .popular-bars{display:flex;gap:6px;align-items:stretch;}
  .pop-option{flex:1;display:flex;flex-direction:column;gap:3px;}
  .pop-label{font-size:10px;color:var(--muted);text-align:center;}
  .pop-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
  .pop-fill-local{height:100%;background:var(--verde);border-radius:3px;transition:width .5s ease;}
  .pop-fill-empate{height:100%;background:var(--oro);border-radius:3px;transition:width .5s ease;}
  .pop-fill-visitante{height:100%;background:var(--azul);border-radius:3px;transition:width .5s ease;}
  .pop-pct{font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center;}
  .pop-pct.local{color:var(--verde);}
  .pop-pct.empate{color:var(--oro);}
  .pop-pct.visitante{color:var(--azul);}
  .pop-top{font-size:10px;color:var(--muted);text-align:center;margin-top:2px;}
  .match-inner{display:flex;align-items:center;padding:1rem 1.25rem;gap:1rem;}
  .team{display:flex;align-items:center;gap:10px;flex:1;}
  .team.right{flex-direction:row-reverse;}
  .flag-lg{font-size:28px;line-height:1;flex-shrink:0;}
  .flag-img{width:40px;height:27px;border-radius:4px;object-fit:cover;flex-shrink:0;}
  .tname{font-size:15px;font-weight:500;}
  .team.right .tname{text-align:right;}
  .match-mid{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:160px;}
  .match-date{font-size:11px;color:var(--muted);text-align:center;}
  .score-input{display:flex;align-items:center;gap:10px;}
  .score-input input{width:52px;height:52px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--texto);font-family:'Bebas Neue',sans-serif;font-size:28px;text-align:center;outline:none;transition:all .2s;-moz-appearance:textfield;}
  .score-input input::-webkit-outer-spin-button,.score-input input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .score-input input:focus{border-color:var(--verde);background:rgba(0,200,83,.06);box-shadow:0 0 0 3px rgba(0,200,83,.12);}
  .score-input input.has-val{border-color:rgba(0,200,83,.35);color:var(--verde);}
  .score-sep{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);}
  .score-ctrl{display:flex;flex-direction:column;gap:3px;}
  .ctrl-btn{width:20px;height:20px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'DM Sans',sans-serif;}
  .ctrl-btn:hover{border-color:var(--verde);color:var(--verde);}
  .match-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 1.25rem;background:rgba(0,0,0,.2);border-top:1px solid var(--border);font-size:12px;}
  .status-dot{width:6px;height:6px;border-radius:50%;}
  .status-dot.empty{background:var(--muted);}
  .status-dot.filled{background:var(--verde);box-shadow:0 0 6px var(--verde);}
  .match-status{font-size:11px;display:flex;align-items:center;gap:5px;}
  .sticky-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,14,23,.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
  .bar-info{font-size:13px;color:var(--muted);}
  .bar-info strong{color:var(--texto);}
  .bar-pts{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--verde);}
  .btn-save{background:var(--verde);color:#000;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;border:none;border-radius:8px;padding:10px 28px;cursor:pointer;transition:all .2s;}
  .btn-save:hover{background:var(--verde-dark);transform:translateY(-1px);}
  .btn-save:disabled{background:var(--muted);cursor:default;transform:none;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid rgba(0,200,83,.4);color:var(--verde);font-size:13px;font-weight:500;padding:10px 20px;border-radius:8px;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="hub.html" class="nav-logo"><div class="dot"></div>PRODE MUNDIAL</a>
  <div class="progress-pill" id="navProgress">Cargando...</div>
</nav>

<div class="wrapper">

  <div class="page-header">
    <div class="page-title">
      <span class="sub">Fase de grupos</span>
      MIS PREDICCIONES
    </div>
    <div style="display:flex;gap:1.5rem;text-align:right">
      <div><div class="hstat-val" id="filledCount" style="color:var(--verde)">0</div><div class="hstat-lbl">Cargadas</div></div>
      <div><div class="hstat-val" id="pendingCount" style="color:var(--muted)">–</div><div class="hstat-lbl">Pendientes</div></div>
    </div>
  </div>

  <div class="global-progress">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;">
      <strong>Progreso general</strong>
      <span style="color:var(--muted)" id="progressPct">0% completado</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="deadline-warn">
    <span style="font-size:18px">⚡</span>
    <span>Las predicciones de grupos se cargan antes del inicio del torneo y no se pueden modificar después.</span>
  </div>

  <div class="group-filter" id="groupFilter">
    <button class="gf-btn active" onclick="filterGroup('all',this)">Todos</button>
  </div>

  <div id="partidosContainer">
    <div class="skeleton" style="height:100px;margin-bottom:10px;border-radius:14px"></div>
    <div class="skeleton" style="height:100px;margin-bottom:10px;border-radius:14px"></div>
    <div class="skeleton" style="height:100px;border-radius:14px"></div>
  </div>

</div>

<div class="sticky-bar">
  <div>
    <div class="bar-info"><strong id="barFilled">0</strong> predicciones guardadas</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px">Guardado automático al completar</div>
  </div>
  <div class="bar-pts" id="barPts">0 pts máx.</div>
  <button class="btn-save" id="saveBtn" onclick="guardarTodo()">Guardar todo</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = "https://ipmyezwxpxnyukyurhqd.supabase.co"
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwbXllend4cHhueXVreXVyaHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjA2OTksImV4cCI6MjA5MzAzNjY5OX0.yRG5H0rsGC6lHcIt1kqPzzzyIUQ8s0ttD73g3Q8rJcI"
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let currentUser = null
  let partidos = []
  let misPreds = {}   // partido_id → { local, visitante }
  let totalPartidos = 0
  let filledCount = 0
  let saveQueue = {}  // partido_id → { local, visitante } pendientes de guardar
  let saveTimer = null

  async function init() {
    const { data } = await db.auth.getSession()
    if (!data.session) { window.location.href = 'login.html'; return }
    currentUser = data.session.user
    await cargarTodo()
  }

  async function cargarTodo() {
    // Partidos
    const { data: pts } = await db
      .from('partidos')
      .select('id,fase,ronda,fecha_hora,cerrado,jugado,goles_local,goles_visitante,pais_local:pais_local_id(nombre,url_bandera,grupo),pais_visitante:pais_visitante_id(nombre,url_bandera)')
      .eq('fase','grupos')
      .order('fecha_hora')
    partidos = pts || []
    totalPartidos = partidos.length

    // Mis predicciones
    const { data: preds } = await db
      .from('predicciones_partidos')
      .select('partido_id,goles_local_pred,goles_visitante_pred')
      .eq('usuario_id', currentUser.id)

    misPreds = {}
    ;(preds || []).forEach(p => {
      misPreds[p.partido_id] = { local: p.goles_local_pred, visitante: p.goles_visitante_pred }
    })

    filledCount = Object.keys(misPreds).length

    // Predicciones populares — solo de partidos cerrados
    const cerrados = partidos.filter(p => p.cerrado || p.jugado).map(p => p.id)
    if (cerrados.length > 0) {
      const { data: todas } = await db
        .from('predicciones_partidos')
        .select('partido_id,goles_local_pred,goles_visitante_pred')
        .in('partido_id', cerrados)
      popularMap = {}
      ;(todas || []).forEach(p => {
        if (!popularMap[p.partido_id]) popularMap[p.partido_id] = { local:0, empate:0, visitante:0, total:0, resultados:{} }
        const m = popularMap[p.partido_id]
        m.total++
        if (p.goles_local_pred > p.goles_visitante_pred) m.local++
        else if (p.goles_local_pred === p.goles_visitante_pred) m.empate++
        else m.visitante++
        const key = `${p.goles_local_pred}-${p.goles_visitante_pred}`
        m.resultados[key] = (m.resultados[key] || 0) + 1
      })
    }

    renderTodo()
  }

  let popularMap = {}

  function renderTodo() {
    // Agrupar por grupo
    const grupos = {}
    partidos.forEach(p => {
      const g = p.pais_local?.grupo || 'Sin grupo'
      if (!grupos[g]) grupos[g] = []
      grupos[g].push(p)
    })

    // Filtros
    const filterHTML = '<button class="gf-btn active" onclick="filterGroup(\'all\',this)">Todos</button>' +
      Object.keys(grupos).sort().map(g => {
        const todos = grupos[g].every(p => misPreds[p.id])
        return `<button class="gf-btn ${todos?'done':''}" onclick="filterGroup('${g}',this)">Grupo ${g}</button>`
      }).join('')
    document.getElementById('groupFilter').innerHTML = filterHTML

    // Partidos
    let html = ''
    Object.keys(grupos).sort().forEach(g => {
      const ps = grupos[g]
      const cargados = ps.filter(p => misPreds[p.id]).length
      html += `
        <div class="group-section" data-group="${g}">
          <div class="group-label">
            <span class="group-letter">Grupo ${g}</span>
            <span style="font-size:12px;color:var(--muted)">${cargados}/${ps.length} cargados</span>
            <div class="group-label-line"></div>
          </div>
          ${ps.map(p => renderPartido(p)).join('')}
        </div>`
    })
    document.getElementById('partidosContainer').innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:2rem">No hay partidos cargados aún</p>'
    updateCounters()
  }

  function renderPartido(p) {
    const pred = misPreds[p.id]
    const filled = !!pred
    const locked = p.cerrado || p.jugado

    const flagL = p.pais_local?.url_bandera
      ? `<img class="flag-img" src="${p.pais_local.url_bandera}">`
      : '<span class="flag-lg">🏳</span>'
    const flagV = p.pais_visitante?.url_bandera
      ? `<img class="flag-img" src="${p.pais_visitante.url_bandera}">`
      : '<span class="flag-lg">🏳</span>'

    const fecha = p.fecha_hora
      ? new Date(p.fecha_hora).toLocaleDateString('es-AR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'America/Argentina/Buenos_Aires'})
      : 'Fecha por confirmar'

    const valL = pred ? pred.local : ''
    const valV = pred ? pred.visitante : ''
    const hasValL = pred ? 'has-val' : ''
    const hasValV = pred ? 'has-val' : ''

    const dotClass = filled ? 'filled' : 'empty'
    const statusColor = filled ? 'var(--verde)' : 'var(--muted)'
    const statusText = locked ? (p.jugado ? `${p.goles_local} – ${p.goles_visitante} (final)` : 'Cerrado') : (filled ? 'Guardado' : 'Sin predicción')

    // Predicciones populares
    let popularHTML = ''
    if (locked && popularMap[p.id] && popularMap[p.id].total > 0) {
      const m = popularMap[p.id]
      const pctL = Math.round((m.local / m.total) * 100)
      const pctE = Math.round((m.empate / m.total) * 100)
      const pctV = Math.round((m.visitante / m.total) * 100)
      const topRes = Object.entries(m.resultados).sort((a,b) => b[1]-a[1])[0]
      const topPct = topRes ? Math.round((topRes[1]/m.total)*100) : 0
      const topStr = topRes ? `${topRes[0]} · elegido por el ${topPct}%` : ''
      const nloc = p.pais_local?.nombre?.split(' ')[0] || 'Local'
      const nvis = p.pais_visitante?.nombre?.split(' ')[0] || 'Visitante'
      popularHTML = `
        <div class="popular-bar">
          <div class="popular-title">¿Qué predijo la gente? · ${m.total} predicciones</div>
          <div class="popular-bars">
            <div class="pop-option">
              <div class="pop-pct local">${pctL}%</div>
              <div class="pop-track"><div class="pop-fill-local" style="width:${pctL}%"></div></div>
              <div class="pop-label">${nloc}</div>
            </div>
            <div class="pop-option">
              <div class="pop-pct empate">${pctE}%</div>
              <div class="pop-track"><div class="pop-fill-empate" style="width:${pctE}%"></div></div>
              <div class="pop-label">Empate</div>
            </div>
            <div class="pop-option">
              <div class="pop-pct visitante">${pctV}%</div>
              <div class="pop-track"><div class="pop-fill-visitante" style="width:${pctV}%"></div></div>
              <div class="pop-label">${nvis}</div>
            </div>
          </div>
          ${topStr ? `<div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center">Resultado más predicho: <b style="color:var(--texto)">${topStr}</b></div>` : ''}
        </div>`
    }

    return `
      <div class="match-block ${filled?'filled':''} ${locked?'locked':''}" id="mb-${p.id}">
        <div class="match-inner">
          <div class="team">${flagL}<div class="tname">${p.pais_local?.nombre||'Local'}</div></div>
          <div class="match-mid">
            <div class="match-date">${fecha}</div>
            <div class="score-input">
              <div class="score-ctrl">
                <button class="ctrl-btn" onclick="change('inp-l-${p.id}',-1)">−</button>
                <button class="ctrl-btn" onclick="change('inp-l-${p.id}',1)">+</button>
              </div>
              <input type="number" id="inp-l-${p.id}" min="0" max="20" value="${valL}" placeholder="–" class="${hasValL}"
                oninput="onInput('${p.id}')" onfocus="this.select()">
              <span class="score-sep">–</span>
              <input type="number" id="inp-v-${p.id}" min="0" max="20" value="${valV}" placeholder="–" class="${hasValV}"
                oninput="onInput('${p.id}')" onfocus="this.select()">
              <div class="score-ctrl">
                <button class="ctrl-btn" onclick="change('inp-v-${p.id}',-1)">−</button>
                <button class="ctrl-btn" onclick="change('inp-v-${p.id}',1)">+</button>
              </div>
            </div>
          </div>
          <div class="team right">${flagV}<div class="tname">${p.pais_visitante?.nombre||'Visitante'}</div></div>
        </div>
        <div class="match-footer">
          <div style="font-size:12px;color:var(--muted)">Exacto: <b style="color:var(--texto)">+5 pts</b> · Ganador: <b style="color:var(--texto)">+3 pts</b></div>
          <div class="match-status">
            <div class="status-dot ${dotClass}" id="dot-${p.id}"></div>
            <span style="color:${statusColor}" id="status-${p.id}">${statusText}</span>
          </div>
        </div>
        ${popularHTML}
      </div>`
  }

  function onInput(partidoId) {
    const inpL = document.getElementById('inp-l-' + partidoId)
    const inpV = document.getElementById('inp-v-' + partidoId)
    const vL = inpL.value, vV = inpV.value
    const bothFilled = vL !== '' && vV !== '' && parseInt(vL) >= 0 && parseInt(vV) >= 0

    inpL.classList.toggle('has-val', vL !== '')
    inpV.classList.toggle('has-val', vV !== '')

    const dot = document.getElementById('dot-' + partidoId)
    const status = document.getElementById('status-' + partidoId)
    const block = document.getElementById('mb-' + partidoId)

    if (bothFilled) {
      dot.className = 'status-dot filled'
      status.style.color = 'var(--verde)'
      status.textContent = 'Guardando...'
      block.classList.add('filled')

      const wasFilled = !!misPreds[partidoId]
      misPreds[partidoId] = { local: parseInt(vL), visitante: parseInt(vV) }
      if (!wasFilled) { filledCount++; updateCounters() }

      // Guardar con debounce
      saveQueue[partidoId] = { local: parseInt(vL), visitante: parseInt(vV) }
      clearTimeout(saveTimer)
      saveTimer = setTimeout(() => flushSave(), 1200)
    } else {
      dot.className = 'status-dot empty'
      status.style.color = 'var(--muted)'
      status.textContent = 'Sin predicción'
      block.classList.remove('filled')
      if (misPreds[partidoId]) { filledCount--; delete misPreds[partidoId]; updateCounters() }
    }
  }

  function change(inputId, delta) {
    const inp = document.getElementById(inputId)
    const cur = parseInt(inp.value) || 0
    inp.value = Math.max(0, cur + delta)
    // Disparar oninput
    const partidoId = inputId.replace('inp-l-','').replace('inp-v-','')
    onInput(partidoId)
  }

  async function flushSave() {
    const entries = Object.entries(saveQueue)
    if (!entries.length) return
    saveQueue = {}

    for (const [partidoId, vals] of entries) {
      await db.from('predicciones_partidos').upsert({
        usuario_id: currentUser.id,
        partido_id: partidoId,
        goles_local_pred: vals.local,
        goles_visitante_pred: vals.visitante
      }, { onConflict: 'usuario_id,partido_id' })

      const status = document.getElementById('status-' + partidoId)
      if (status) status.textContent = 'Guardado'
    }
  }

  async function guardarTodo() {
    clearTimeout(saveTimer)
    const btn = document.getElementById('saveBtn')
    btn.disabled = true; btn.textContent = 'Guardando...'
    await flushSave()
    btn.disabled = false; btn.textContent = 'Guardar todo'
    showToast('¡Todas las predicciones guardadas!')
  }

  function updateCounters() {
    const pct = totalPartidos > 0 ? Math.round((filledCount / totalPartidos) * 100) : 0
    document.getElementById('filledCount').textContent = filledCount
    document.getElementById('pendingCount').textContent = totalPartidos - filledCount
    document.getElementById('progressFill').style.width = pct + '%'
    document.getElementById('progressPct').textContent = pct + '% completado'
    document.getElementById('barFilled').textContent = filledCount
    document.getElementById('navProgress').textContent = filledCount + ' / ' + totalPartidos + ' cargadas'
    document.getElementById('barPts').textContent = (filledCount * 5) + ' pts máx.'
  }

  function filterGroup(group, btn) {
    document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    document.querySelectorAll('.group-section').forEach(sec => {
      sec.style.display = group === 'all' || sec.dataset.group === group ? '' : 'none'
    })
  }

  function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg; t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 2800)
  }

  init()
</script>
</body>
</html>
